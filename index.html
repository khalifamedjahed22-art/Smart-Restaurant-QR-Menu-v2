<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة المطاعم الذكية</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #eceff1; margin: 0; }
.container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
input, button { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border: 1px solid #cfd8dc; border-radius: 6px; font-size: 16px; }
.item { display: flex; justify-content: space-between; border-bottom: 1px solid #eff0f1; padding: 12px 0; align-items: center; }
.payment-box { margin-top: 30px; padding: 15px; background: #e8f5e9; border: 2px solid #81c784; border-radius: 10px; color: #2e7d32; text-align: center; }
h1, h2, h3 { text-align: center; color: #37474f; margin-bottom: 20px; }
.btn-action { background: #00897b; color: white; border: none; cursor: pointer; font-weight: bold; }
.btn-delete { background: #e53935; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
#qrCodeCanvas { display: flex; justify-content: center; margin-top: 20px; }
#customerView { display: none; }
.back-link { display: block; text-align: center; margin-top: 20px; color: #607d8b; text-decoration: none; }
</style>
</head>
<body>

<div class="container" id="appContainer">
    <div id="editorView">
        <h1 id="pageTitle">إعداد قائمة المطعم</h1>
        <input type="text" id="restName" placeholder="اسم المطعم">
        <input type="text" id="itemName" placeholder="اسم الطبق">
        <input type="number" id="itemPrice" placeholder="السعر (دج)">
        <button class="btn-action" onclick="addItem()">إضافة الطبق</button>
        <button class="btn-action" onclick="generateQR()" style="background: #1e88e5;">توليد رابط QR</button>
        <hr>
        <div id="menuList"></div>
        <div class="payment-box">
            <h3>إعدادات الدفع</h3>
            <input type="text" id="accountHolder" placeholder="اسم صاحب الحساب">
            <input type="text" id="accountRip" placeholder="رقم الـ CCP / RIP">
        </div>
        <div id="qrCodeCanvas"></div>
        <div id="qrLinkArea" style="text-align: center; margin-top: 15px;"></div>
    </div>

    <div id="customerView">
        <h1 id="custRestName"></h1>
        <div id="custMenuList"></div>
        <div class="payment-box">
            <h3>للدفع عبر بريدي موب</h3>
            <p><strong>صاحب الحساب:</strong> <span id="custHolder"></span></p>
            <p><strong>رقم الـ CCP/RIP:</strong> <span id="custRip"></span></p>
            <p><strong>رسوم الخدمة الثابتة:</strong> 300 دج</p>
        </div>
        <a href="." class="back-link">إنشاء قائمتك الخاصة</a>
    </div>
</div>

<script type="module">
    // 1. استيراد Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    // 2. إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyDMoUK_8h56Y3ZfVySV4uEdWbZkmdieWqw",
        authDomain: "mysmartmenu-80a57.firebaseapp.com",
        projectId: "mysmartmenu-80a57",
        storageBucket: "mysmartmenu-80a57.firebasestorage.app",
        messagingSenderId: "482274317209",
        appId: "1:482274317209:web:65c97f0d5c7bf7c1383908"
    };

    // 3. تهيئة Firebase
    const app = initializeApp(firebaseConfig);
    console.log("Firebase initialized successfully!");

    // ==========================================
    // كود التطبيق الأساسي
    // ==========================================
    let menu = [];
    const SERVICE_FEE = 300;

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const encodedData = urlParams.get('data');

        if (encodedData) {
            document.getElementById('editorView').style.display = 'none';
            document.getElementById('customerView').style.display = 'block';
            try {
                const data = JSON.parse(decodeURIComponent(atob(encodedData)));
                document.getElementById('custRestName').innerText = data.restaurant;
                document.getElementById('custHolder').innerText = data.accountHolder;
                document.getElementById('custRip').innerText = data.accountRip;
                const list = document.getElementById('custMenuList');
                data.items.forEach(item => {
                    list.innerHTML += `<div class="item"><span>${item.name}</span><strong>${item.price} دج</strong></div>`;
                });
            } catch (e) { document.getElementById('custMenuList').innerHTML = "<p>رابط غير صالح</p>"; }
        } else {
            loadFromStorage();
        }
    };

    function loadFromStorage() {
        if (localStorage.getItem('restName')) document.getElementById('restName').value = localStorage.getItem('restName');
        if (localStorage.getItem('accountHolder')) document.getElementById('accountHolder').value = localStorage.getItem('accountHolder');
        if (localStorage.getItem('accountRip')) document.getElementById('accountRip').value = localStorage.getItem('accountRip');
        if (localStorage.getItem('menu')) {
            menu = JSON.parse(localStorage.getItem('menu'));
            renderEditor();
        }
    }

    function renderEditor() {
        const list = document.getElementById('menuList');
        list.innerHTML = '';
        menu.forEach((item, index) => {
            list.innerHTML += `<div class="item"><span>${item.name}</span><strong>${item.price} دج</strong><button class="btn-delete" onclick="removeItem(${index})">حذف</button></div>`;
        });
    }

    function addItem() {
        const n = document.getElementById('itemName'), p = document.getElementById('itemPrice');
        if (n.value.trim() && p.value > 0) {
            menu.push({name: n.value, price: p.value});
            localStorage.setItem('menu', JSON.stringify(menu));
            renderEditor();
            n.value = ''; p.value = '';
        } else { alert("يرجى إدخال اسم وسعر صحيح!"); }
    }

    function removeItem(index) {
        menu.splice(index, 1);
        localStorage.setItem('menu', JSON.stringify(menu));
        renderEditor();
    }

    function generateQR() {
        const restName = document.getElementById('restName').value.trim();
        const holder = document.getElementById('accountHolder').value;
        const rip = document.getElementById('accountRip').value;
        if (!restName) { alert("أدخل اسم المطعم أولاً!"); return; }

        localStorage.setItem('restName', restName);
        localStorage.setItem('accountHolder', holder);
        localStorage.setItem('accountRip', rip);

        const dataToEncode = {
            restaurant: restName,
            items: menu,
            accountHolder: holder,
            accountRip: rip,
            serviceFee: SERVICE_FEE
        };

        const menuUrl = window.location.href.split('?')[0] + '?data=' + btoa(encodeURIComponent(JSON.stringify(dataToEncode)));
        document.getElementById('qrCodeCanvas').innerHTML = "";
        new QRCode(document.getElementById('qrCodeCanvas'), { text: menuUrl, width: 200, height: 200 });
        document.getElementById('qrLinkArea').innerHTML = `<a href="${menuUrl}" target="_blank">رابط القائمة جاهز - اضغط هنا</a>`;
    }

    // تصدير الدوال للـ window لتعمل الأزرار
    window.addItem = addItem;
    window.removeItem = removeItem;
    window.generateQR = generateQR;
</script>
</body>
</html>
