<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المطاعم الذكية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #eceff1; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cfd8dc; border-radius: 6px; font-size: 16px; }
        .item { display: flex; justify-content: space-between; border-bottom: 1px solid #eff0f1; padding: 12px 0; align-items: center; }
        .btn-action { background: #00897b; color: white; border: none; cursor: pointer; font-weight: bold; }
        #subscriptionView { display: block; text-align: center; }
        #editorView, #customerView { display: none; }
        #qrCodeCanvas { display: flex; justify-content: center; margin-top: 20px; }
        .whatsapp-link { color: #25d366; font-weight: bold; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="subscriptionView">
        <h2>تفعيل خدمة القائمة الرقمية</h2>
        <p>الاشتراك الشهري: 4,000 دج</p>
        <div style="background:#e8f5e9; padding:10px; border-radius:5px; margin:10px 0;">CCP: 007 99999 0018864026 62</div>
        <input type="text" id="activationCode" placeholder="أدخل كود التفعيل هنا">
        <button class="btn-action" onclick="window.checkSubscription()">تفعيل الدخول</button>
        <p style="margin-top: 15px;">
            أرسل الإيصال إلى <a href="https://wa.me/213562419291" class="whatsapp-link">الواتساب الخاص بي</a> للحصول على الكود
        </p>
    </div>

    <div id="editorView">
        <h1>إعداد القائمة</h1>
        <input type="text" id="restName" placeholder="اسم المطعم">
        <input type="text" id="itemName" placeholder="اسم الطبق">
        <input type="number" id="itemPrice" placeholder="السعر (دج)">
        <button class="btn-action" onclick="window.addItem()">إضافة الطبق</button>
        <div id="menuList"></div>
        <button class="btn-action" onclick="window.generateQR()" style="background: #1e88e5;">توليد رابط QR</button>
        <div id="qrCodeCanvas"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDMoUK_8h56Y3ZfVySV4uEdWbZkmdieWqw",
        authDomain: "mysmartmenu-80a57.firebaseapp.com",
        projectId: "mysmartmenu-80a57",
        storageBucket: "mysmartmenu-80a57.firebasestorage.app",
        messagingSenderId: "482274317209",
        appId: "1:482274317209:web:65c97f0d5c7bf7c1383908"
    };
    initializeApp(firebaseConfig);

    // التحقق من الرابط ?admin عند تحميل الصفحة
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('admin')) {
            document.getElementById('subscriptionView').style.display = 'none';
            document.getElementById('editorView').style.display = 'block';
        }
    };

    window.checkSubscription = () => {
        if(document.getElementById('activationCode').value === "1234") {
            document.getElementById('subscriptionView').style.display = 'none';
            document.getElementById('editorView').style.display = 'block';
        } else { alert("كود خاطئ"); }
    };

    let menu = [];
    window.addItem = () => {
        const n = document.getElementById('itemName');
        const p = document.getElementById('itemPrice');
        if(n.value && p.value) {
            menu.push({name: n.value, price: p.value});
            const list = document.getElementById('menuList');
            list.innerHTML += `<div class="item"><span>${n.value}</span><strong>${p.value} دج</strong></div>`;
            n.value = ''; p.value = '';
        }
    };

    window.generateQR = () => {
        const restName = document.getElementById('restName').value;
        if(!restName) { alert("أدخل اسم المطعم"); return; }
        const url = window.location.href.split('?')[0] + '?rest=' + encodeURIComponent(restName);
        document.getElementById('qrCodeCanvas').innerHTML = "";
        new QRCode(document.getElementById('qrCodeCanvas'), { text: url, width: 200, height: 200 });
    };
</script>
</body>
</html>
