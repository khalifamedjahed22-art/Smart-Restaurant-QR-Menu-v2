<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المطاعم الرقمية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { cursor: pointer; background: #00897b; color: white; border: none; font-weight: bold; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        #subOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #mainApp, #editorView, #customerView { display: none; }
        #qrCodeCanvas { display: flex; justify-content: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="overlay" id="subOverlay">
    <h2>تفعيل خدمة القائمة</h2>
    <input type="text" id="activationKey" placeholder="كود التفعيل">
    <button onclick="checkKey()">دخول</button>
</div>

<div class="container" id="mainApp">
    <div id="editorView">
        <h1>لوحة الإدارة</h1>
        <input type="text" id="restName" placeholder="اسم المطعم">
        <hr>
        <input type="text" id="itemName" placeholder="اسم الطبق">
        <input type="number" id="itemPrice" placeholder="السعر">
        <button onclick="addItem()" style="background:#2196f3;">إضافة الطبق</button>
        <div id="menuList"></div>
        <hr>
        <button onclick="generateQR()" style="background:#4caf50;">توليد كود QR للمطعم</button>
        <div id="qrCodeCanvas"></div>
    </div>
    
    <div id="customerView">
        <h1 id="custRestName"></h1>
        <div id="custMenuList"></div>
    </div>
</div>

<script>
    const VALID_KEYS = ["REST123", "KHALIFA2026"]; 
    let menu = JSON.parse(localStorage.getItem('myMenu') || '[]');

    // --- منطق التشغيل ---
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        
        // 1. رابط الزبون (QR) له الأولوية
        if (urlParams.get('data')) {
            loadCustomerView(urlParams.get('data'));
        } 
        // 2. رابط المدير السري
        else if (window.location.search.includes('admin')) {
            showEditor();
        } 
        // 3. حالة التفعيل المحفوظة
        else if (localStorage.getItem('isActivated') === 'true') {
            showEditor();
        } 
        // 4. لا شيء؟ أظهر الاشتراك
        else {
            document.getElementById('subOverlay').style.display = 'flex';
        }
    };

    // --- دوال المدير ---
    function checkKey() {
        const inputKey = document.getElementById('activationKey').value;
        if (VALID_KEYS.includes(inputKey)) {
            localStorage.setItem('isActivated', 'true');
            showEditor();
        } else {
            alert("كود خاطئ");
        }
    }

    function showEditor() {
        document.getElementById('subOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('editorView').style.display = 'block';
        renderEditor();
    }

    function addItem() {
        const name = document.getElementById('itemName').value;
        const price = document.getElementById('itemPrice').value;
        if(name && price) {
            menu.push({name, price});
            localStorage.setItem('myMenu', JSON.stringify(menu));
            renderEditor();
        }
    }

    function renderEditor() {
        const list = document.getElementById('menuList');
        list.innerHTML = menu.map((item, index) => `
            <div class="item">
                <span>${item.name} - ${item.price} دج</span>
                <button onclick="removeItem(${index})" style="background:#f44336; width:auto;">حذف</button>
            </div>
        `).join('');
    }

    function removeItem(index) {
        menu.splice(index, 1);
        localStorage.setItem('myMenu', JSON.stringify(menu));
        renderEditor();
    }

    function generateQR() {
        const restName = document.getElementById('restName').value;
        const data = { restaurant: restName, items: menu };
        const encoded = btoa(JSON.stringify(data));
        const url = window.location.href.split('?')[0] + '?data=' + encoded;
        
        document.getElementById('qrCodeCanvas').innerHTML = "";
        new QRCode(document.getElementById('qrCodeCanvas'), { text: url, width: 200, height: 200 });
    }

    // --- دوال الزبون ---
    function loadCustomerView(encodedData) {
        document.getElementById('subOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('customerView').style.display = 'block';
        
        try {
            const data = JSON.parse(atob(encodedData));
            document.getElementById('custRestName').innerText = data.restaurant;
            document.getElementById('custMenuList').innerHTML = data.items.map(item => `
                <div class="item"><span>${item.name}</span><span>${item.price} دج</span></div>
            `).join('');
        } catch(e) {
            document.body.innerHTML = "<h1>رابط غير صالح</h1>";
        }
    }
</script>
</body>
</html>
